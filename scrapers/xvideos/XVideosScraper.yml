name: XVideosScraper
description: Stash scraper for https://www.xvideos.com

sceneByURL:
  - action: script
    url:
      - xvideos.com/video
    script:
      - python3
      - XVideosScraper.py
      - sceneByURL

sceneByName:
  action: script
  script:
    - python3
    - XVideosScraper.py
    - sceneByName

performerByURL:
  - action: script
    url:
      - xvideos.com/profiles/
    script:
      - python3
      - XVideosScraper.py
      - performerByURL
